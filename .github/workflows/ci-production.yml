name: CI Production

on:
  push:
    branches: [production]

jobs:
  test-and-deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run quality:production

      - name: Build docker image
        run: docker build -t cart-course:${{ github.sha }} .

      - name: Deploy to production
        if: github.ref == 'refs/heads/production' && secrets.PRODUCTION_DEPLOY_HOOK_URL != ''
        env:
          DEPLOY_HOOK: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$DEPLOY_HOOK"
