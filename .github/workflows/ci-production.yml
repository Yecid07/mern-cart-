name: CI Production

on:
  push:
    branches: [production]

jobs:
  test-and-deploy-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        if: github.ref == 'refs/heads/production'
        env:
          DEPLOY_HOOK: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$DEPLOY_HOOK"
          else
            echo "PRODUCTION_DEPLOY_HOOK_URL is not set. Skipping deploy."
          fi
