steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cart-api:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cart-api:$SHORT_SHA'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cart-api:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/cart-api:$SHORT_SHA
      - --location=us-central1
      - --config=clouddeploy.yaml

images:
  - 'gcr.io/$PROJECT_ID/cart-api:latest'
  - 'gcr.io/$PROJECT_ID/cart-api:$SHORT_SHA'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
timeout: '1800s'
