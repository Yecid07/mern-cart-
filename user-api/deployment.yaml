apiVersion: v1
kind: Namespace
metadata:
  name: user-api
  labels:
    name: user-api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: user-api
  labels:
    app: user-api
    version: v2
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-api
  template:
    metadata:
      labels:
        app: user-api
        version: v2
    spec:
      containers:
      - name: user-api
        image: gcr.io/PROJECT_ID/user-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: user-api-secrets
              key: mongodb-uri
        - name: GCP_PROJECT_ID
          value: "PROJECT_ID"
        - name: ORDER_API_URL
          value: "https://order-api-xxxxx.a.run.app"
        - name: SERVICE_NAME
          value: "user-api"
        - name: SERVICE_VERSION
          value: "2.0"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: user-api
  namespace: user-api
  labels:
    app: user-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: user-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-api-hpa
  namespace: user-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-api-pdb
  namespace: user-api
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: user-api

---
apiVersion: v1
kind: Secret
metadata:
  name: user-api-secrets
  namespace: user-api
type: Opaque
stringData:
  mongodb-uri: "mongodb+srv://USERNAME:PASSWORD@CLUSTER.mongodb.net/users_db?retryWrites=true&w=majority"
