steps:
  # Paso 1: Compilar imagen
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/user-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/user-api:latest'
      - '.'
    dir: 'user-api'

  # Paso 2: Hacer push a Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/user-api:$SHORT_SHA'

  # Paso 3: Desplegar en Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=user-api-cluster'
    args:
      - 'run'
      - '--filename=user-api/deployment.yaml'
      - '--image=gcr.io/$PROJECT_ID/user-api:$SHORT_SHA'
      - '--location=us-central1'

  # Alternativa: Desplegar directamente en Cloud Run (sin Kubernetes)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'user-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/user-api:$SHORT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,MONGODB_URI=${_MONGODB_URI}'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '60'

images:
  - 'gcr.io/$PROJECT_ID/user-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/user-api:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

substitutions:
  _MONGODB_URI: '${MONGODB_URI}'

tags:
  - 'gcp-cloud'
  - 'user-api'
  - '${SHORT_SHA}'
